<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto-Buddy Pro | Elite Navigation</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --accent: #FF8C00; --bg: #000000; --card: #1C1C1E; --text: #FFFFFF;
            --success: #32D74B; --warning: #FFD60A; --danger: #FF453A;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .search-container {
            padding: 15px; background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(25px);
            position: fixed; top: 0; width: 100%; z-index: 9999; box-sizing: border-box;
            border-bottom: 1px solid #333; border-radius: 0 0 20px 20px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; background: #2C2C2E; border-radius: 12px; margin-bottom: 8px; border: 1px solid #444; }
        input { background: transparent; border: none; color: white; padding: 12px; width: 85%; font-size: 15px; outline: none; }
        .gps-btn { background: none; border: none; padding: 10px; cursor: pointer; color: var(--accent); font-size: 1.2rem; }

        .search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1C1C1E; border: 2px solid var(--accent); border-radius: 12px;
            max-height: 250px; overflow-y: auto; z-index: 10001; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,1);
        }
        .result-item { padding: 16px; border-bottom: 1px solid #333; font-size: 1rem; color: #FFF; cursor: pointer; }
        .result-item:active { background: #333; }

        #directionHud {
            position: fixed; top: 165px; left: 10px; right: 10px;
            background: var(--accent); color: black; padding: 15px; border-radius: 15px;
            display: none; z-index: 2100; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center;
        }

        #hud {
            position: fixed; top: 235px; left: 10px; right: 10px;
            background: rgba(28, 28, 30, 0.95); padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; z-index: 1500; border: 1px solid rgba(255,140,0,0.3);
            backdrop-filter: blur(10px); gap: 5px;
        }
        .hud-main { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.6rem; color: #8E8E93; text-transform: uppercase; display: block; }
        .hud-val { font-size: 1rem; font-weight: 800; color: var(--text); }
        #statusDesc { font-size: 0.75rem; color: #aaa; text-align: center; border-top: 1px solid #333; padding-top: 5px; margin-top: 5px; }

        #map { flex-grow: 1; margin-top: 155px; z-index: 1; }

        .bottom-sheet { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; z-index: 1001; }
        .clock-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #liveClock { font-size: 1.5rem; font-weight: 200; letter-spacing: -1px; }
        #etaBox { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

        .weather-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .w-box { background: #2C2C2E; padding: 10px 5px; border-radius: 12px; text-align: center; }
        .w-val { font-size: 0.85rem; font-weight: bold; display: block; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { background: #2C2C2E; color: var(--text); border: none; padding: 15px; border-radius: 14px; font-weight: 800; font-size: 0.85rem; }
        .start-btn { background: var(--success); color: black; }
        .petrol-icon { font-size: 20px; text-align: center; line-height: 25px; }
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div id="directionHud">Follow the Orange Route</div>

<div class="search-container">
    <div class="input-wrapper">
        <input type="text" id="startInput" placeholder="A: Starting from..." autocomplete="off">
        <button class="gps-btn" onclick="useMyLocation()">📍</button>
        <div id="startResults" class="search-results"></div>
    </div>
    <div class="input-wrapper">
        <input type="text" id="endInput" placeholder="B: Heading to..." autocomplete="off">
        <div id="endResults" class="search-results"></div>
    </div>
</div>

<div id="hud">
    <div class="hud-main">
        <div class="hud-item"><span class="hud-label">Distance</span><span id="distVal" class="hud-val">--</span> km</div>
        <div class="hud-item"><span class="hud-label">Safety Status</span><span id="conditionVal" class="hud-val">Ready</span></div>
    </div>
    <div id="statusDesc">Plan your Jharkhand ride...</div>
</div>

<div id="map"></div>

<div class="bottom-sheet">
    <div class="clock-row">
        <div id="liveClock">00:00:00</div>
        <div id="etaBox">ETA: --:--</div>
    </div>
    <div class="weather-row">
        <div class="w-box"><span class="stat-label">Temp</span><span id="tempVal" class="w-val">--</span></div>
        <div class="w-box"><span class="stat-label">Rain</span><span id="rainVal" class="w-val">--</span></div>
        <div class="w-box"><span class="stat-label">Wind</span><span id="windVal" class="w-val">--</span></div>
        <div class="w-box"><span class="stat-label">Visib.</span><span id="visVal" class="w-val">--</span></div>
    </div>
    <div class="btn-row">
        <button class="action-btn" id="petrolBtn" onclick="findPetrolOnRoute()">⛽ PETROL</button>
        <button id="startBtn" class="action-btn start-btn" onclick="startRide()">START RIDE</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    let map, routingControl, userMarker, poiMarkers = [];
    let startCoords = null, endCoords = null, travelTimeMinutes = 0, currentRouteCoords = [];
    let isNavigating = false;
    let isRoutingLoading = false;

    function setupAutocomplete(inputId, resultsId, onSelect) {
        const input = document.getElementById(inputId);
        const resultsDiv = document.getElementById(resultsId);
        let timeout;

        input.addEventListener('input', () => {
            clearTimeout(timeout);
            const query = input.value.trim();
            if (query.length < 3) { resultsDiv.style.display = 'none'; return; }

            timeout = setTimeout(async () => {
                const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=22.8046&lon=86.2029&limit=5`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data && data.features.length > 0) {
                        resultsDiv.innerHTML = "";
                        data.features.forEach(f => {
                            const name = f.properties.name || "";
                            const city = f.properties.city || f.properties.state || "";
                            const display = `${name}${city ? ', ' + city : ''}`;
                            const div = document.createElement('div');
                            div.className = 'result-item';
                            div.innerText = display;
                            div.onclick = () => {
                                onSelect({ lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0] }, name);
                                resultsDiv.style.display = 'none';
                                input.blur();
                            };
                            resultsDiv.appendChild(div);
                        });
                        resultsDiv.style.display = 'block';
                    }
                } catch (e) {}
            }, 500);
        });
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([22.8046, 86.2029], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        setupAutocomplete('startInput', 'startResults', (coords, name) => {
            startCoords = coords;
            document.getElementById('startInput').value = name;
            autoPlan();
        });
        
        setupAutocomplete('endInput', 'endResults', (coords, name) => {
            endCoords = coords;
            document.getElementById('endInput').value = name;
            autoPlan();
        });

        setInterval(updateClock, 1000);
        useMyLocation(); 
    }

    function autoPlan() {
        if (startCoords && endCoords) {
            isRoutingLoading = true;
            document.getElementById('petrolBtn').innerText = "🔄 ROUTING...";
            
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(startCoords.lat, startCoords.lon), L.latLng(endCoords.lat, endCoords.lon)],
                lineOptions: { styles: [{ color: '#FF8C00', weight: 7 }] },
                createMarker: () => null,
                addWaypoints: false,
                draggableWaypoints: false
            }).on('routesfound', function(e) {
                const route = e.routes[0];
                currentRouteCoords = route.coordinates;
                travelTimeMinutes = route.summary.totalTime / 60;
                document.getElementById('distVal').innerText = (route.summary.totalDistance / 1000).toFixed(1);
                document.getElementById('petrolBtn').innerText = "⛽ PETROL";
                isRoutingLoading = false;
                fetchWeather(endCoords.lat, endCoords.lon);
            }).on('routingerror', function() {
                isRoutingLoading = false;
                document.getElementById('petrolBtn').innerText = "⛽ PETROL";
            }).addTo(map);
        }
    }

    async function findPetrolOnRoute() {
        if (isRoutingLoading) return alert("Calculating route... please wait.");
        if (currentRouteCoords.length === 0) return alert("Plan a route first!");
        
        poiMarkers.forEach(m => map.removeLayer(m));
        poiMarkers = [];

        // Sample 6 points for high precision strictly along the line
        const sampleSteps = [0, 0.2, 0.4, 0.6, 0.8, 1];
        const pointsToScan = sampleSteps.map(step => 
            currentRouteCoords[Math.floor((currentRouteCoords.length - 1) * step)]
        );
        
        for (let pt of pointsToScan) {
            // High precision query: Limit search to a tiny radius near route points
            const url = `https://photon.komoot.io/api/?q=fuel&lat=${pt.lat}&lon=${pt.lng}&limit=2`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                data.features.forEach(f => {
                    const lat = f.geometry.coordinates[1];
                    const lon = f.geometry.coordinates[0];
                    
                    // Only add if not already marked (prevent duplicates)
                    const isDuplicate = poiMarkers.some(m => m.getLatLng().lat === lat && m.getLatLng().lng === lon);
                    
                    if (!isDuplicate) {
                        const m = L.marker([lat, lon], {
                            icon: L.divIcon({ 
                                html: '⛽', 
                                className: 'petrol-icon', 
                                iconSize: [25, 25],
                                iconAnchor: [12, 12]
                            })
                        }).addTo(map).bindPopup(`<b>${f.properties.name || "Petrol Station"}</b><br>${f.properties.city || ""}`);
                        poiMarkers.push(m);
                    }
                });
            } catch (e) {}
        }
        
        if(poiMarkers.length > 0) {
            const group = new L.featureGroup(poiMarkers);
            map.fitBounds(group.getBounds().pad(0.2));
            alert(`Found ${poiMarkers.length} stations strictly along your route.`);
        } else {
            alert("No stations found on this specific path.");
        }
    }

    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability,visibility&windspeed_unit=kmh&temperature_unit=celsius&timezone=auto`);
            const data = await res.json();
            const cur = data.current_weather;
            const rain = data.hourly.precipitation_probability[0];
            const vis = (data.hourly.visibility[0] / 1000).toFixed(1);

            document.getElementById('tempVal').innerText = Math.round(cur.temperature) + "°";
            document.getElementById('windVal').innerText = Math.round(cur.windspeed) + " kph";
            document.getElementById('rainVal').innerText = rain + "%";
            document.getElementById('visVal').innerText = vis + " km";
            
            let status = "OPTIMAL"; 
            let color = "var(--success)";
            let desc = "Clear skies & low wind. Perfect for riding.";

            if (cur.windspeed > 35 || rain > 30 || vis < 5) {
                status = "CAUTION";
                color = "var(--warning)";
                desc = "Strong winds or rain detected. Keep a steady grip.";
            }
            if (cur.windspeed > 55 || rain > 60 || vis < 1) {
                status = "DANGER";
                color = "var(--danger)";
                desc = "Extreme conditions. Ride not recommended.";
            }

            const condEl = document.getElementById('conditionVal');
            condEl.innerText = status;
            condEl.style.color = color;
            document.getElementById('statusDesc').innerText = desc;
        } catch(e) {}
    }

    function useMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                startCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                document.getElementById('startInput').value = "My Location";
                map.setView([startCoords.lat, startCoords.lon], 14);
                if (!userMarker) {
                    userMarker = L.circleMarker([startCoords.lat, startCoords.lon], { radius: 10, color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.9 }).addTo(map);
                }
                autoPlan();
                fetchWeather(startCoords.lat, startCoords.lon);
            }, null, { enableHighAccuracy: true });
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-IN', { hour12: false });
        if (travelTimeMinutes > 0) {
            const eta = new Date(now.getTime() + travelTimeMinutes * 60000);
            document.getElementById('etaBox').innerText = "ETA: " + eta.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
    }

    function startRide() {
        if (!startCoords || !endCoords) return alert("Select A and B points.");
        isNavigating = !isNavigating;
        const btn = document.getElementById('startBtn');
        const dirHud = document.getElementById('directionHud');
        if (isNavigating) {
            btn.innerText = "STOP RIDE"; btn.style.background = "var(--danger)"; btn.style.color = "white";
            dirHud.style.display = "block"; map.setZoom(18);
        } else {
            btn.innerText = "START RIDE"; btn.style.background = "var(--success)"; btn.style.color = "black";
            dirHud.style.display = "none";
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
