<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto-Buddy Pro | Elite Navigation</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --accent: #FF8C00; --bg: #000000; --card: #1C1C1E; --text: #FFFFFF;
            --success: #32D74B; --warning: #FFD60A; --danger: #FF453A;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .search-container {
            padding: 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px);
            position: fixed; top: 0; width: 100%; z-index: 2000; box-sizing: border-box;
            border-bottom: 1px solid #333; border-radius: 0 0 20px 20px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; background: #2C2C2E; border-radius: 12px; margin-bottom: 8px; }
        input { background: transparent; border: none; color: white; padding: 12px; width: 100%; font-size: 16px; outline: none; }
        .gps-btn { background: none; border: none; padding: 10px; cursor: pointer; color: var(--accent); font-size: 1.3rem; }

        #directionHud {
            position: fixed; top: 140px; left: 10px; right: 10px;
            background: var(--accent); color: black; padding: 15px; border-radius: 15px;
            display: none; z-index: 2100; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center;
        }

        #hud {
            position: fixed; top: 220px; left: 10px; right: 10px;
            background: rgba(28, 28, 30, 0.85); padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; z-index: 1500; border: 1px solid rgba(255,140,0,0.3);
            backdrop-filter: blur(10px); gap: 10px;
        }
        .hud-main { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.6rem; color: #8E8E93; text-transform: uppercase; display: block; }
        .hud-val { font-size: 1rem; font-weight: 800; color: var(--text); }
        
        /* Status Meaning Legend */
        #statusMeaning {
            font-size: 0.7rem; color: #aaa; text-align: center; border-top: 1px solid #444; padding-top: 5px; width: 100%;
        }

        #map { flex-grow: 1; margin-top: 130px; z-index: 1; }

        .bottom-sheet { 
            background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8); z-index: 1001;
        }
        
        .clock-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #liveClock { font-size: 1.5rem; font-weight: 200; letter-spacing: -1px; }
        #etaBox { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

        .weather-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .w-box { background: #2C2C2E; padding: 10px 5px; border-radius: 12px; text-align: center; }
        .w-val { font-size: 0.85rem; font-weight: bold; display: block; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .action-btn { 
            background: #2C2C2E; color: var(--text); border: none; padding: 12px; 
            border-radius: 14px; font-weight: 800; font-size: 0.75rem; 
        }
        .start-btn { background: var(--success); color: black; }
        .plan-btn { background: var(--accent); color: black; }

        .autocomplete-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #1C1C1E;
            border-radius: 10px; max-height: 160px; overflow-y: auto; z-index: 3000; display: none;
            border: 1px solid #333;
        }
        .result-item { padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div id="directionHud">Follow the Orange Route</div>

<div class="search-container">
    <div class="input-wrapper">
        <input type="text" id="startInput" placeholder="From (Current Location)" autocomplete="off">
        <button class="gps-btn" onclick="useMyLocation()">📍</button>
        <div id="startResults" class="autocomplete-results"></div>
    </div>
    <div class="input-wrapper">
        <input type="text" id="endInput" placeholder="Destination City" autocomplete="off">
        <div id="endResults" class="autocomplete-results"></div>
    </div>
</div>

<div id="hud">
    <div class="hud-main">
        <div class="hud-item"><span class="hud-label">Distance</span><span id="distVal" class="hud-val">0</span><span style="font-size: 0.6rem;"> km</span></div>
        <div class="hud-item"><span class="hud-label">Safety Status</span><span id="conditionVal" class="hud-val">Scanning...</span></div>
    </div>
    <div id="statusMeaning">Ready to analyze route conditions...</div>
</div>

<div id="map"></div>

<div class="bottom-sheet">
    <div class="clock-row">
        <div id="liveClock">00:00:00</div>
        <div id="etaBox">ETA: --:--</div>
    </div>

    <div class="weather-row">
        <div class="w-box"><span class="hud-label">Temp</span><span id="tempVal" class="w-val">--</span></div>
        <div class="w-box"><span class="hud-label">Rain</span><span id="rainVal" class="w-val">--</span></div>
        <div class="w-box"><span class="hud-label">Wind</span><span id="windVal" class="w-val">--</span></div>
        <div class="w-box"><span class="hud-label">Visib.</span><span id="visVal" class="w-val">--</span></div>
    </div>

    <div class="btn-row">
        <button class="action-btn" onclick="findPOIs('fuel')">⛽ PETROL</button>
        <button class="action-btn plan-btn" onclick="planRoute()">PLAN</button>
        <button id="startBtn" class="action-btn start-btn" onclick="startRide()">START</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    let map, routingControl, poiMarkers = [], userMarker;
    let startCoords = null, endCoords = null, currentRoutePath = [];
    let travelTimeMinutes = 0;
    let isNavigating = false;
    let instructions = [];

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-IN', { hour12: false });
        if (travelTimeMinutes > 0) {
            const eta = new Date(now.getTime() + travelTimeMinutes * 60000);
            document.getElementById('etaBox').innerText = "ETA: " + eta.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setTimeout(updateClock, 1000);
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        setupAutocomplete('startInput', 'startResults', (c) => startCoords = c);
        setupAutocomplete('endInput', 'endResults', (c) => endCoords = c);
        updateClock();
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                startCoords = { lat, lon };
                fetchWeather(lat, lon); 
                updateUserPos(p);
                map.setView([lat, lon], 13);
            });
            navigator.geolocation.watchPosition(updateUserPos, null, { enableHighAccuracy: true });
        }
    }

    function updateUserPos(pos) {
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) {
            userMarker = L.circleMarker(latlng, { radius: 10, color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.9 }).addTo(map);
        } else {
            userMarker.setLatLng(latlng);
        }
        if (isNavigating) {
            map.panTo(latlng, { animate: true, duration: 1.0 });
            if (instructions.length > 0) {
                const next = instructions[0];
                document.getElementById('directionHud').innerText = next.text + " (" + Math.round(next.distance) + "m)";
            }
        }
    }

    function useMyLocation() {
        navigator.geolocation.getCurrentPosition((p) => {
            startCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            document.getElementById('startInput').value = "My Location";
            map.setView([startCoords.lat, startCoords.lon], 14);
            fetchWeather(startCoords.lat, startCoords.lon);
        });
    }

    function setupAutocomplete(inputId, resultsId, onSelect) {
        const input = document.getElementById(inputId);
        const resultsDiv = document.getElementById(resultsId);
        input.addEventListener('input', async () => {
            if (input.value.length < 3) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value},India&limit=5`);
                const data = await res.json();
                resultsDiv.innerHTML = ''; resultsDiv.style.display = 'block';
                data.forEach(item => {
                    const div = document.createElement('div'); div.className = 'result-item';
                    div.innerText = item.display_name.split(', India')[0];
                    div.onclick = () => { 
                        input.value = div.innerText; 
                        onSelect({ lat: item.lat, lon: item.lon }); 
                        resultsDiv.style.display = 'none';
                        fetchWeather(item.lat, item.lon);
                    };
                    resultsDiv.appendChild(div);
                });
            } catch(e) {}
        });
    }

    async function planRoute() {
        if (!startCoords || !endCoords) return alert("Please select From and To locations.");
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [L.latLng(startCoords.lat, startCoords.lon), L.latLng(endCoords.lat, endCoords.lon)],
            lineOptions: { styles: [{ color: '#FF8C00', weight: 7 }] },
            addWaypoints: false, draggableWaypoints: false
        }).on('routesfound', function(e) {
            const route = e.routes[0];
            currentRoutePath = route.coordinates;
            instructions = route.instructions;
            travelTimeMinutes = route.summary.totalTime / 60;
            document.getElementById('distVal').innerText = (route.summary.totalDistance / 1000).toFixed(1);
        }).addTo(map);
        fetchWeather(endCoords.lat, endCoords.lon);
    }

    function startRide() {
        if (!startCoords) return alert("GPS not found.");
        isNavigating = !isNavigating;
        const btn = document.getElementById('startBtn');
        const dirHud = document.getElementById('directionHud');
        if (isNavigating) {
            btn.innerText = "STOP"; btn.style.background = "var(--danger)"; btn.style.color = "white";
            dirHud.style.display = "block"; map.setZoom(18); map.panTo(userMarker.getLatLng());
        } else {
            btn.innerText = "START"; btn.style.background = "var(--success)"; btn.style.color = "black";
            dirHud.style.display = "none";
        }
    }

    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability,visibility&windspeed_unit=kmh&temperature_unit=celsius&timezone=auto`);
            const data = await res.json();
            const temp = Math.round(data.current_weather.temperature);
            const wind = Math.round(data.current_weather.windspeed);
            const rain = data.hourly.precipitation_probability[0];
            const vis = (data.hourly.visibility[0] / 1000).toFixed(1);

            document.getElementById('tempVal').innerText = temp + "°";
            document.getElementById('windVal').innerText = wind + " kph";
            document.getElementById('rainVal').innerText = rain + "%";
            document.getElementById('visVal').innerText = vis + " km";
            
            let status = "OPTIMAL"; let color = "#32D74B";
            let meaning = "Clear skies, low wind & good visibility. Perfect ride.";

            if (wind > 35 || rain > 30 || vis < 5) { 
                status = "CAUTION"; color = "#FFD60A"; 
                meaning = "Moderate rain, wind gusts or low visibility. Gear up.";
            }
            if (wind > 50 || rain > 60 || vis < 1) { 
                status = "DANGER"; color = "#FF453A"; 
                meaning = "Heavy storms, high winds or extreme fog. Do not ride.";
            }

            const statusEl = document.getElementById('conditionVal');
            statusEl.innerText = status; statusEl.style.color = color;
            document.getElementById('statusMeaning').innerText = meaning;

        } catch(e) { console.error("Weather error"); }
    }

    async function findPOIs(type) {
        if (currentRoutePath.length === 0) return alert("Plan route first.");
        poiMarkers.forEach(m => map.removeLayer(m)); poiMarkers = [];
        const pts = [currentRoutePath[0], currentRoutePath[Math.floor(currentRoutePath.length/2)], currentRoutePath[currentRoutePath.length-1]];
        for (let pt of pts) {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=fuel+near+${pt.lat},${pt.lng}&limit=3`);
            const data = await res.json();
            data.forEach(item => {
                const marker = L.marker([item.lat, item.lon]).addTo(map).bindPopup("Petrol Station");
                poiMarkers.push(marker);
            });
        }
    }
    window.onload = initMap;
</script>
</body>
</html>
